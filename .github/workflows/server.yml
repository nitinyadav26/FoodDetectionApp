name: Server CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server.yml"

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: foodsense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/foodsense_test
      REDIS_URL: redis://localhost:6379
      GEMINI_API_KEY: test-key
      JWT_SECRET: test-jwt-secret
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Run database migrations
        working-directory: server
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: server
        run: npm test

      - name: Type check
        working-directory: server
        run: npx tsc --noEmit
