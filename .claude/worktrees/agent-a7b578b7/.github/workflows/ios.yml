name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --project-directory=.
      - name: Build
        run: |
          xcodebuild build \
            -workspace FoodDetectionApp.xcworkspace \
            -scheme FoodDetectionApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tail -50
      - name: Run tests
        run: |
          xcodebuild test \
            -workspace FoodDetectionApp.xcworkspace \
            -scheme FoodDetectionApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tail -50
