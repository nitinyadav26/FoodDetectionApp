name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Create placeholder google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"foodsense-ci","storage_bucket":"foodsense-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.foodsense.android"}},"api_key":[{"current_key":"ci-placeholder"}]}],"configuration_version":"1"}
          EOF
      - name: Build with Gradle
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon
