services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: foodsense
      # POSTGRES_PASSWORD is picked up from .env via env_file above.
    # Ports intentionally NOT exposed publicly — only the app container
    # reaches postgres via the internal docker network.
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    # Redis starts with a password baked in via command; loaded from .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    env_file:
      - .env
    # Ports intentionally NOT exposed publicly.
    volumes:
      - redisdata:/data

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
      PORT: "3000"
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
